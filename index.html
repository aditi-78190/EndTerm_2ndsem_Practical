<!DOCTYPE html>
<html>
<head>
    <title>Age Calculator</title>
    <style>
        body{
            font-family: Arial;
            text-align:center;
            margin-top:100px;
            background: white;
        }

        .box{
            width:300px;
            margin:auto;
            padding:20px;
            background:white;
            border-radius:10px;
        }

        input,button{
            width:90%;
            padding:10px;
            margin:10px;
        }

        button{
            background:blue;
            color:white;
            border:none;
        }

        h3{
            color:green;
        }
    </style>
</head>
<body>

<div class="box">

<h2>Age Calculator</h2>

<input type="date" id="dob">

<button onclick="age()">Calculate</button>

<h3 id="result"></h3>

</div>

<script>

function age(){

let dob = new Date(document.getElementById("dob").value);
let today = new Date();

let years = today.getFullYear() - dob.getFullYear();
let months = today.getMonth() - dob.getMonth();
let days = today.getDate() - dob.getDate();

if(days < 0){
    days = days + 30;
    months--;
}

if(months < 0){
    months = months + 12;
    years--;
}

document.getElementById("result").innerHTML =
years + " Years " + months + " Months " + days + " Days";

}

</script>

</body>
</html>
